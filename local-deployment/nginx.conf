events {
    worker_connections 1024;
}

http {
    upstream product-service {
        server product-service:8001;
    }

    upstream cart-service {
        server cart-service:8002;
    }

    upstream user-service {
        server user-service:8003;
    }

    upstream order-service {
        server order-service:8004;
    }

    server {
        listen 80;

        # Health check
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Product Service routes
        location /api/products {
            proxy_pass http://product-service/products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Cart Service routes
        location /api/cart {
            proxy_pass http://cart-service/cart;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $http_x_user_id;
        }

        # User Service routes
        location /api/users {
            proxy_pass http://user-service/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $http_x_user_id;
        }

        # Order Service routes
        location /api/orders {
            proxy_pass http://order-service/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $http_x_user_id;
        }
    }
}
